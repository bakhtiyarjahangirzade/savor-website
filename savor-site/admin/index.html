<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Savor Admin</title>
    <link rel="icon" href="../assets/savor-logo-main.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="admin.css?v=1" />
    <script src="vendor/cropper.min.js"></script>
    <script src="../cms-local.js?v=1"></script>
    <script src="admin.js?v=1" defer></script>
  </head>
  <body>
    <div id="loading-screen" class="center-screen">
      <img src="../assets/savor-logo-long.svg" alt="Savor" />
      <p>Admin paneli hazırlanıyor…</p>
    </div>

    <main id="setup-screen" class="center-screen" hidden>
      <form id="setup-form" class="auth-card">
        <a href="../index.html"><img class="auth-logo" src="../assets/savor-logo-long.svg" alt="Savor" /></a>
        <p class="eyebrow">İLK KURULUM</p>
        <h1>Ana admini oluştur</h1>
        <p class="helper">Bu hesap silinemez ve tüm adminleri, içerikleri ve işlem kayıtlarını yönetir.</p>
        <label>Ad soyad<input name="name" required autocomplete="name" /></label>
        <label>E-posta<input name="email" type="email" required autocomplete="email" /></label>
        <label>Şifre<input name="password" type="password" minlength="6" required autocomplete="new-password" /></label>
        <button class="button primary" type="submit">Ana admini oluştur</button>
      </form>
    </main>

    <main id="login-screen" class="center-screen" hidden>
      <form id="login-form" class="auth-card">
        <a href="../index.html"><img class="auth-logo" src="../assets/savor-logo-long.svg" alt="Savor" /></a>
        <p class="eyebrow">SAVOR CONTENT STUDIO</p>
        <h1>Admin girişi</h1>
        <label>E-posta<input name="email" type="email" required autocomplete="username" /></label>
        <label>Şifre<input name="password" type="password" required autocomplete="current-password" /></label>
        <button class="button primary" type="submit">Giriş yap</button>
        <a class="back-link" href="../index.html">← Siteye dön</a>
      </form>
    </main>

    <div id="admin-app" class="admin-layout" hidden>
      <aside class="sidebar">
        <a class="sidebar-brand" href="../index.html"><img src="../assets/savor-logo-long.svg" alt="Savor" /></a>
        <nav aria-label="Admin bölümleri">
          <button class="nav-button active" data-section="site">Ana sayfa ve metinler</button>
          <button class="nav-button" data-section="products">Ürünler</button>
          <button class="nav-button" data-section="recipes">Tarifler</button>
          <button class="nav-button" data-section="admins">Adminler</button>
          <button class="nav-button" data-section="logs">İşlem kayıtları</button>
          <button class="nav-button" data-section="backup">İçe / dışa aktar</button>
        </nav>
        <div class="sidebar-user">
          <strong id="current-user-name"></strong>
          <span id="current-user-role"></span>
          <button id="logout-button" class="text-button" type="button">Çıkış yap</button>
        </div>
      </aside>

      <header class="mobile-header">
        <img src="../assets/savor-logo-long.svg" alt="Savor" />
        <button id="menu-button" type="button" aria-label="Menüyü aç">☰</button>
      </header>

      <main class="workspace">
        <div id="panel"></div>
      </main>
    </div>

    <input id="image-file" type="file" accept="image/*" hidden />
    <input id="backup-file" type="file" accept="application/json,.json" hidden />

    <dialog id="crop-dialog" class="crop-dialog">
      <div class="dialog-head">
        <div><p class="eyebrow">GÖRSEL DÜZENLE</p><h2>Kırp ve yerleştir</h2></div>
        <button class="icon-button" id="crop-close" type="button" aria-label="Kapat">×</button>
      </div>
      <div id="crop-stage" class="crop-stage"><img id="crop-source" alt="Kırpılacak görsel" /></div>
      <div class="crop-controls">
        <label>Oran
          <select id="crop-ratio">
            <option value="free">Serbest</option>
            <option value="1.7777777778">16:9</option>
            <option value="1.3333333333">4:3</option>
            <option value="1">1:1</option>
          </select>
        </label>
        <button type="button" data-crop-action="rotate-left">↶ Sola döndür</button>
        <button type="button" data-crop-action="rotate-right">↷ Sağa döndür</button>
        <button type="button" data-crop-action="zoom-in">＋ Yaklaştır</button>
        <button type="button" data-crop-action="zoom-out">－ Uzaklaştır</button>
        <button type="button" data-crop-action="flip-x">⇋ Yatay çevir</button>
      </div>
      <div class="dialog-actions">
        <button id="crop-cancel" class="button secondary" type="button">Vazgeç</button>
        <button id="crop-apply" class="button primary" type="button">Görseli kullan</button>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
